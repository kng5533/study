; ===== メモリ・実行時間 =====
memory_limit = 512M
max_execution_time = 300
post_max_size = 100M
upload_max_filesize = 100M

; ===== タイムゾーン =====
date.timezone = Asia/Tokyo

; ===== エラー表示 =====
display_errors = On          ; ブラウザにエラーを表示
display_startup_errors = On  ; PHP起動時エラーも表示
error_reporting = E_ALL      ; 全てのエラーを出す

; ===== ログ =====
log_errors = On
error_log = /var/log/php_errors.log

; ===== その他 =====
cgi.fix_pathinfo = 0
